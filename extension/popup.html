<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      color: #a78bfa;
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .header p {
      color: #888;
      font-size: 0.8rem;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.9rem;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #a78bfa; }
    button {
      width: 100%;
      padding: 10px;
      background: #a78bfa;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover { background: #9061f9; }
    .tip {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.78rem;
      color: #888;
      text-align: center;
    }
    .tip span { color: #a78bfa; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🕵️ SocialSpy</h1>
    <p>AI-Powered Digital Footprint Analyzer</p>
  </div>

  <input type="text" id="username" placeholder="Enter username to search..." />
  <button id="searchBtn">🔍 Search Username</button>

  <div class="tip">
    💡 Tip: <span>Right-click</span> any username on any website to search instantly!
  </div>

  <script src="popup.js"></script>
</body>
</html>
